name: UNF*CK Frontend CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-json.lock'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Biome Linter & Formatter
        run: |
          cd frontend
          npx @biomejs/biome check .

      - name: Type Check TypeScript
        run: |
          cd frontend
          npx tsc --noEmit